name: branch-governance

on:
  pull_request:
    branches:
      - main

jobs:
  branch-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Branch governance gate
        run: |
          chmod +x scripts/repo/ci-branch-gate.sh
          ./scripts/repo/ci-branch-gate.sh "${{ github.head_ref }}"
