name: branch-governance

on:
  pull_request:
    branches:
      - main

jobs:
  branch-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Branch governance gate
        run: |
          chmod +x scripts/repo/ci-branch-gate.sh
          ./scripts/repo/ci-branch-gate.sh "${{ github.head_ref }}"

  pr-issue-link-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR issue closing link
        env:
          HEAD_REF: ${{ github.head_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          cat > /tmp/pr_body.md <<EOF
          ${PR_BODY}
          EOF
          chmod +x scripts/repo/pr_issue_guard.py
          python3 scripts/repo/pr_issue_guard.py \
            --branch "${HEAD_REF}" \
            --pr-body-file /tmp/pr_body.md
