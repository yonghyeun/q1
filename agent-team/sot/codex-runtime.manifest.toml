[runtime]
default_profile = "adlc_leader"
project_doc_fallback_filenames = ["AGENTS.md"]

[features]
multi_agent = true

[profiles.adlc_leader]
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
prompt_source = "agent-team/sot/agents/adlc-leader.md"
prompt_output = "adlc-leader.md"

[profiles.planner_pm]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
prompt_source = "agent-team/sot/agents/planner-pm.md"
prompt_output = "planner-pm.md"

[profiles.builder]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
prompt_source = "agent-team/sot/agents/builder.md"
prompt_output = "builder.md"

[profiles.reviewer]
model = "gpt-5.3-codex"
model_reasoning_effort = "high"
model_verbosity = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
prompt_source = "agent-team/sot/agents/reviewer.md"
prompt_output = "reviewer.md"

[agents.adlc_leader]
description = "ADLC 리더 에이전트. 라우팅, 승인 게이트, 최종 의사결정 요약을 담당한다."
profile = "adlc_leader"
toml_output = "adlc-leader.toml"

[agents.planner_pm]
description = "기획/문제정의 에이전트. 가설과 검증 기준을 정의한다."
profile = "planner_pm"
toml_output = "planner-pm.toml"

[agents.builder]
description = "실행 에이전트. 승인된 범위의 산출물을 생성한다."
profile = "builder"
toml_output = "builder.toml"

[agents.reviewer]
description = "검증 에이전트. 수용 기준 통과 여부와 리스크를 판단한다."
profile = "reviewer"
toml_output = "reviewer.toml"

[task_template]
prompt_source = "agent-team/subagents/_template/prompt.md"
prompt_output = "task-template.md"
