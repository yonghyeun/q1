slice_id: MVP-TIMESTAMP-CLICK-SEEK
parent_wbs: mvp-wbs/v1
planning_status: planning_blocked
goal: 사용자가 노트 안의 타임스탬프를 클릭하면 현재 플레이어가 해당 시점으로 이동한다.
why: 타임스탬프 삽입만으로는 학습 회고 루프가 닫히지 않고, 클릭 seek까지 있어야 노트와 영상이 실제로 연결된다.
contracts:
  - docs/product/mvp-spec.md
  - docs/product/contracts/domain.ts
  - docs/product/contracts/analytics.ts
acceptance_criteria:
  - 노트 안의 타임스탬프를 클릭하면 외부 이동이 아니라 플레이어 seek으로 동작한다.
  - 클릭한 타임스탬프는 현재 열린 video_id 맥락 안에서 해석된다.
  - 클릭 후 재생 흐름이 끊기지 않는다.
  - `timestamp_clicked` 이벤트를 남길 수 있다.
owned_scope:
  - 타임스탬프 파싱 경계
  - 노트 읽기 상호작용 경계
  - 플레이어 seek 연결 경계
  - 타임스탬프 클릭 분석 이벤트 연결 경계
verification_requirements:
  - 단위 검증 증거 필요
  - 통합 검증 증거 필요
  - 수동 UX 검증 필요
  - 계약 호환성 검증 필요
dependencies:
  - MVP-TS-INSERT
non_goals:
  - 클릭 가능한 타임스탬프 자동 하이라이트
  - 문단 단위 재생 동기화
  - 외부 브라우저로 유튜브 링크 열기
risks:
  - 타임스탬프 형식 contract가 고정되지 않으면 클릭 해석 규칙이 달라질 수 있다.
  - 플레이어 seek 표면이 아직 별도 contract로 고정되지 않았다.
assumptions:
  - 삽입된 타임스탬프는 노트 안에서 파싱 가능한 일정 형식을 가진다.
open_questions:
  - "[blocking] 타임스탬프 markdown 형식을 어디까지 허용할지?"
  - "[blocking] 클릭 가능한 요소를 markdown renderer에서 만들지 editor/read model adapter에서 만들지?"
workspace_bindings:
  - purpose: 구현
    branch: feat/mvp-timestamp-click-seek
    worktree: /worktrees/q1-mvp-timestamp-click-seek
refs:
  planned_flow: null
  run_id: null
  related_docs:
    - docs/product/mvp-spec.md
notes:
  - 형식 contract가 닫히기 전까지는 planning_blocked로 유지한다.
