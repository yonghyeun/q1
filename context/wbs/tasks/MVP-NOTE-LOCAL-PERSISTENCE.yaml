slice_id: MVP-NOTE-LOCAL-PERSISTENCE
parent_wbs: mvp-wbs/v1
planning_status: planned
goal: 사용자가 영상별 노트를 작성하고 브라우저 로컬 저장으로 다시 이어서 편집할 수 있다.
why: 타임스탬프와 학습 기록이 세션을 넘어 유지돼야 제품이 단발성 메모가 아니라 반복 사용 가능한 학습 도구가 된다.
contracts:
  - docs/product/mvp-spec.md
  - docs/product/contracts/domain.ts
  - docs/product/contracts/storage.ts
  - docs/product/contracts/analytics.ts
acceptance_criteria:
  - 각 `video_id`마다 1개의 마크다운 노트를 작성하고 수정할 수 있다.
  - 노트 변경 내용은 명시적 저장 버튼 없이 브라우저 로컬 저장소에 반영된다.
  - 같은 `video_id`를 다시 열면 이전에 저장된 노트가 복원된다.
  - 같은 `video_id`의 write/read 모드는 동일한 노트 저장 정본을 참조한다.
  - 다른 `video_id`의 노트와 내용이 섞이지 않는다.
  - `note_created` 이벤트를 남길 수 있다.
owned_scope:
  - `video_id` 기준 노트 조회 및 생성 경계
  - 노트 편집 상태 유지 경계
  - 브라우저 로컬 저장 경계
  - 노트 생성 분석 이벤트 연결 경계
verification_requirements:
  - 단위 검증 증거 필요
  - 통합 검증 증거 필요
  - 수동 UX 검증 필요
  - 계약 호환성 검증 필요
dependencies:
  - MVP-PLAYER-NOTE-WORKSPACE
non_goals:
  - 계정 기반 동기화 및 백업
  - 영상별 다중 노트
  - 노트 버전 히스토리
  - 협업 코멘트
risks:
  - 자동저장 타이밍이 불안정하면 최신 입력이 덮어써지거나 유실된 것처럼 보일 수 있다.
  - 로컬 저장소 용량과 브라우저별 동작 차이가 긴 노트 편집 경험에 영향을 줄 수 있다.
assumptions:
  - MVP는 `1 Video : 1 Note` 규칙을 유지한다.
  - 노트와 설정은 브라우저 LocalStorage만 사용한다.
open_questions:
  - "[blocking] `note_created` 이벤트를 최초 입력 시점과 최초 저장 완료 시점 중 어디에 맞출지?"
  - "[later] 자동저장 debounce 기준을 contract로 명시할지?"
workspace_bindings: []
refs:
  planned_flow: null
  run_id: null
  related_docs:
    - docs/product/problem-brief.md
    - docs/product/sitemap.md
    - docs/product/screen-spec.md
notes:
  - 타임스탬프 reference 구조는 이 slice가 아니라 `MVP-TS-INSERT`에서 닫는다.
