slice_id: MVP-TS-INSERT
parent_wbs: mvp-wbs/v1
planning_status: planned
goal: 사용자가 Player + Note 화면에서 현재 재생 시점을 노트에 삽입할 수 있다.
why: 영상의 특정 구간을 근거로 남기는 핵심 경험이 있어야 노트가 단순 메모가 아니라 학습 기록이 된다.
contracts:
  - docs/product/mvp-spec.md
  - docs/product/contracts/domain.ts
  - docs/product/contracts/storage.ts
  - docs/product/contracts/analytics.ts
acceptance_criteria:
  - Player + Note 화면에서 현재 재생 시점을 노트에 넣는 진입점이 있다.
  - 타임스탬프 삽입 결과가 노트에 사람이 읽을 수 있는 형태로 남는다.
  - 삽입된 타임스탬프는 현재 열린 video_id와 연결된다.
  - 삽입 동작이 기존 노트 작성 흐름을 깨지 않는다.
  - `timestamp_inserted` 이벤트를 남길 수 있다.
owned_scope:
  - 플레이어 현재 시점 노출 경계
  - 노트 편집 삽입 경계
  - 타임스탬프 참조 형식화 경계
  - 노트 저장 및 분석 이벤트 연결 경계
verification_requirements:
  - 단위 검증 증거 필요
  - 통합 검증 증거 필요
  - 수동 UX 검증 필요
  - 계약 호환성 검증 필요
dependencies:
  - Player + Note 화면 진입 흐름이 먼저 준비되어 있어야 한다.
  - `video_id` 기준 `Note` 저장 규칙이 유지되어야 한다.
non_goals:
  - 타임스탬프 클릭 시 seek 동작
  - 키보드 단축키 세분화
  - 자동 일시정지 동작
  - 문단 단위 자동 앵커링
risks:
  - 에디터 삽입 계약이 아직 문서로 고정되지 않았다.
  - 플레이어 현재 시점을 어떤 표면으로 노출할지 아직 정해지지 않았다.
assumptions:
  - MVP에서는 1 Video : 1 Note 규칙을 유지한다.
  - 타임스탬프는 `Note` 안에 markdown 성격의 reference로 남긴다.
  - 브라우저 로컬 저장만으로 이 slice의 persistence를 닫을 수 있다.
open_questions:
  - "[later] 현재 시점 삽입 진입점은 버튼만 먼저 둘지, 단축키까지 같은 slice에서 다룰지?"
  - "[blocking] 타임스탬프 형식을 별도 계약 문서로 먼저 고정할지?"
  - "[blocking] 분석 이벤트 발행 책임을 삽입 경계에 둘지 별도 adapter 경계로 둘지?"
workspace_binding:
  branch: null
  worktree: null
  assigned_agent: null
  assigned_profile: null
refs:
  planned_flow: null
  run_id: null
  related_docs: []
notes:
  - concrete owned_paths와 required_tests는 planned flow와 packet 단계에서 구체화한다.
