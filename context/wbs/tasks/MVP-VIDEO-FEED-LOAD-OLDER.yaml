slice_id: MVP-VIDEO-FEED-LOAD-OLDER
parent_wbs: mvp-wbs/v1
planning_status: draft
goal: 사용자가 현재 선택한 피드 범위 기준으로 더 오래된 영상을 추가로 불러올 수 있다.
why: 첫 페이지 이후에도 학습 소스를 계속 탐색할 수 있어야 앱 내부 피드가 실사용 경로로 성립한다.
contracts:
  - docs/product/mvp-spec.md
  - docs/product/contracts/domain.ts
  - docs/product/contracts/analytics.ts
  - docs/product/contracts/api-youtube.ts
acceptance_criteria:
  - 사용자가 현재 피드 범위 기준으로 다음 영상 묶음을 추가 요청할 수 있다.
  - `All` 피드에서는 기존 목록 뒤에 더 오래된 영상이 중복 없이 이어진다.
  - 특정 채널 필터에서는 해당 채널 범위 안에서만 더 오래된 영상이 이어진다.
  - `video_feed_load_older_clicked` 이벤트를 남길 수 있다.
owned_scope:
  - 피드 페이지네이션 요청 경계
  - `All` 피드 버퍼 확장 및 머지 경계
  - 필터별 추가 로딩 컨텍스트 경계
  - `Load older` 분석 이벤트 연결 경계
verification_requirements:
  - 단위 검증 증거 필요
  - 통합 검증 증거 필요
  - 수동 UX 검증 필요
  - 계약 호환성 검증 필요
dependencies:
  - MVP-VIDEO-FEED-LATEST-LIST
  - MVP-VIDEO-FEED-CHANNEL-FILTER
non_goals:
  - 무한 스크롤
  - 사전 prefetch 최적화
  - 피드 검색 기능
risks:
  - `All` 피드의 가상 페이지네이션은 채널별 버퍼 고갈 시점이 달라 추가 fetch 정책이 복잡해질 수 있다.
  - 추가 로딩 중 중복 영상이나 순서 흔들림이 생기면 학습 목록 신뢰도가 떨어진다.
assumptions:
  - 기본 추가 로딩 단위는 30개다.
  - 현재 필터 상태를 기준으로 추가 로딩 범위를 결정한다.
open_questions:
  - "[blocking] `All` 피드에서 어떤 채널 버퍼를 먼저 추가 fetch할지 기준을 어디까지 고정할지?"
  - "[blocking] 일부 채널 추가 fetch 실패를 부분 성공으로 허용할지?"
workspace_bindings: []
refs:
  planned_flow: null
  run_id: null
  related_docs:
    - docs/product/problem-brief.md
notes:
  - 채널별 API fetch 전략은 planned flow와 packet 단계에서 concrete path/test로 내린다.
